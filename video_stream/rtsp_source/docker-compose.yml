services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: rtsp-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"        # RTSP
      - "8888:8888"        # HLS  (ブラウザ動作確認用)
      - "8889:8889"        # WebRTC HTTP/WHEP (ブラウザ動作確認用)
      - "8189:8189/udp"    # WebRTC ICE/UDP
      - "9997:9997"        # MediaMTX REST API (ステータス確認用)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    networks:
      - rtsp_net

  streamer:
    build: ./streamer
    container_name: rtsp-streamer
    restart: unless-stopped
    depends_on:
      - mediamtx
    volumes:
      - ../videos:/videos:ro
    environment:
      RTSP_SERVER: mediamtx
      RTSP_PORT: "8554"
      STREAM_PATH: live
      VIDEO_SOURCE: /videos
      LOOP: "true"
      TRANSCODE: "false"
    networks:
      - rtsp_net

networks:
  rtsp_net:
    name: rtsp_net
    driver: bridge
