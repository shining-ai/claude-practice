name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'todo/**'
      - 'view_algorithm/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            todo/package-lock.json
            view_algorithm/package-lock.json

      - name: Install dependencies (todo)
        run: npm ci
        working-directory: todo

      - name: Build (todo)
        run: npm run build
        working-directory: todo

      - name: Install dependencies (view_algorithm)
        run: npm ci
        working-directory: view_algorithm

      - name: Build (view_algorithm)
        run: npm run build
        working-directory: view_algorithm

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/todo
          mkdir -p deploy/view_algorithm
          cp -r todo/dist/. deploy/todo/
          cp -r view_algorithm/dist/. deploy/view_algorithm/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
