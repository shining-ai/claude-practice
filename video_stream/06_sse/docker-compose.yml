services:
  sse:
    build: ./app
    container_name: sse-yolo
    restart: unless-stopped
    environment:
      RTSP_URL: rtsp://mediamtx:8554/live
      MODEL: yolov8n.pt
      CONFIDENCE: "0.5"
      PORT: "8006"
      SEND_INTERVAL: "0.5"
    ports:
      - "8006:8006"
    networks:
      - rtsp_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  rtsp_net:
    external: true
